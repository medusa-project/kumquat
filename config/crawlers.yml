# The error will still be logged and rendered in the error page, 
# but it will not be sent to the admin email address.

- ClaudeBot
- Anthropic
- Applebot
- Bingbot
- AhrefsBot
- SemrushBot
- DataforseoBot
- SogouwebSpider
- FeedValidator
- DuckDuckBot
- Googlebot
